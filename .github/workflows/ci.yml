name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Least-privilege by default; each job widens only what it needs.
permissions: {}

jobs:
  app:
    name: app — build + test + e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: E2E tests
        run: npm run test:e2e
