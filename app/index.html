<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Decentraland Shop | Wearables & Emotes for Your Avatar</title>
    <meta
      name="description"
      content="Discover wearables and emotes to make your Decentraland avatar your own. Explore thousands of unique looks and find your style in seconds."
    />
    <meta name="theme-color" content="#691fa9" />
    <meta name="robots" content="index,follow" />
    <meta name="author" content="Decentraland" />
    <link rel="canonical" href="https://shop.decentraland.zone/" />

    <!-- Favicon: the Decentraland mark (same as the marketplace). -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="DCL Shop" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Decentraland Shop" />
    <meta property="og:title" content="Decentraland Shop | Wearables & Emotes for Your Avatar" />
    <meta
      property="og:description"
      content="Discover wearables and emotes to make your Decentraland avatar your own. Explore thousands of unique looks and find your style in seconds."
    />
    <meta property="og:url" content="https://shop.decentraland.zone/" />
    <meta property="og:image" content="https://shop.decentraland.zone/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Decentraland Shop — wearables and emotes for your avatar" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@decentraland" />
    <meta name="twitter:title" content="Decentraland Shop | Wearables & Emotes for Your Avatar" />
    <meta
      name="twitter:description"
      content="Discover wearables and emotes to make your Decentraland avatar your own. Explore thousands of unique looks and find your style in seconds."
    />
    <meta name="twitter:image" content="https://shop.decentraland.zone/og-image.png" />
    <meta name="twitter:image:alt" content="Decentraland Shop — wearables and emotes for your avatar" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Warm the 3D preview / fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- Warm the 3D item-preview pipeline so hover-to-preview feels instant: open connections to the
         wearable-preview app + the content server it pulls assets from (both zone/dev and org/prod). -->
    <link rel="preconnect" href="https://wearable-preview.decentraland.zone" />
    <link rel="preconnect" href="https://wearable-preview.decentraland.org" />
    <link rel="preconnect" href="https://peer.decentraland.zone" crossorigin />
    <link rel="preconnect" href="https://peer.decentraland.org" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
